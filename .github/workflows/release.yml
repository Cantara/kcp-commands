name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json

      - name: Build Node.js hook runner
        run: cd typescript && npm ci && npm run build

      - name: Build Java daemon (index.txt auto-generated by Maven)
        run: mvn -f java/pom.xml package -DskipTests -q

      - name: Build KCP user CLI (kcp stats / validate / init)
        run: |
          git clone --depth=1 https://github.com/Cantara/knowledge-context-protocol.git kcp-spec
          cd kcp-spec/cli && npm ci && npm run bundle
          cp dist/kcp-user-cli.js ../../kcp-user-cli.js

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: "kcp-commands ${{ github.ref_name }}"
          body: |
            ## Installation

            **Java daemon** — ~12 ms/hook call (recommended, requires Java 21):
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Cantara/kcp-commands/${{ github.ref_name }}/bin/install.sh | bash -s -- --java
            ```

            **Node.js** — ~250 ms/hook call (requires Node.js only):
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Cantara/kcp-commands/${{ github.ref_name }}/bin/install.sh | bash -s -- --node
            ```

            Or clone and run `./install.sh` for an interactive prompt.

            See [README.md](https://github.com/Cantara/kcp-commands#readme) for full details.
          files: |
            java/target/kcp-commands-daemon.jar
            typescript/dist/cli.js
            kcp-user-cli.js
