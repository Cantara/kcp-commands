name: Build and smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-java:
    name: Java daemon — build + startup + hook round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Java daemon
        run: cd java && mvn clean package -q -DskipTests

      - name: Verify JAR exists
        run: test -f java/target/kcp-commands-daemon.jar

      - name: Start daemon
        run: |
          java --enable-native-access=ALL-UNNAMED \
            -jar java/target/kcp-commands-daemon.jar \
            > /tmp/kcp-daemon.log 2>&1 &
          echo "DAEMON_PID=$!" >> $GITHUB_ENV

      - name: Wait for daemon health
        run: |
          for i in $(seq 1 10); do
            sleep 0.5
            if curl -sf http://localhost:7734/health > /dev/null 2>&1; then
              echo "✓ daemon healthy after ${i} × 0.5s"
              exit 0
            fi
          done
          echo "✗ daemon did not start within 5s"
          cat /tmp/kcp-daemon.log
          exit 1

      - name: Hook round-trip — inject path (mvn)
        run: |
          echo '{"tool_name":"Bash","tool_input":{"command":"mvn help:describe"}}' | \
            curl -sf -X POST http://localhost:7734/hook \
              -H "Content-Type: application/json" \
              --data-binary @- | grep -q "additionalContext"
          echo "✓ inject path: additionalContext returned"

      - name: Hook round-trip — filter-only path (git status)
        run: |
          CODE=$(echo '{"tool_name":"Bash","tool_input":{"command":"git status"}}' | \
            curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:7734/hook \
              -H "Content-Type: application/json" \
              --data-binary @-)
          [ "$CODE" = "200" ] && echo "✓ filter-only path: 200" || (echo "✗ filter-only path: $CODE"; exit 1)

      - name: Run Java unit tests
        run: cd java && mvn test -q

  verify-kcp-manifest:
    name: KCP 0.26 — content hash + serving endpoint verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify unit content hashes (RFC-0019)
        run: |
          python3 - <<'EOF'
          import yaml, hashlib, sys

          with open('knowledge.yaml') as f:
              manifest = yaml.safe_load(f)

          errors = []
          checked = 0
          for unit in manifest.get('units', []):
              path = unit.get('path', '')
              ch = unit.get('content_hash', {})
              if not ch or not isinstance(path, str) or path.startswith('http'):
                  continue
              expected = ch.get('value', '')
              if not expected:
                  continue
              try:
                  actual = hashlib.sha256(open(path, 'rb').read()).hexdigest()
                  checked += 1
                  if actual != expected:
                      errors.append(f"MISMATCH {path}:\n  expected {expected}\n  actual   {actual}")
                      print(f"✗ {path}")
                  else:
                      print(f"✓ {path}  ({actual[:16]}...)")
              except FileNotFoundError:
                  errors.append(f"FILE NOT FOUND: {path}")
                  print(f"✗ {path}: not found")

          print(f"\n{checked} unit(s) checked")
          if errors:
              print("\nContent hash verification FAILED:")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print("All content hashes match ✓")
          EOF

      - name: Verify serving endpoint binding (RFC-0024)
        run: |
          python3 - <<'EOF'
          import yaml, urllib.request, sys

          with open('knowledge.yaml') as f:
              manifest = yaml.safe_load(f)

          serving = manifest.get('serving', {})
          urls = serving.get('manifest', [])
          if not urls:
              print("No serving.manifest declared — skipping")
              sys.exit(0)

          errors = []
          for url in urls:
              try:
                  req = urllib.request.urlopen(url, timeout=10)
                  if req.status == 200:
                      print(f"✓ {url}  (HTTP {req.status})")
                  else:
                      errors.append(f"✗ {url}  (HTTP {req.status})")
              except Exception as e:
                  errors.append(f"✗ {url}  ({e})")

          if errors:
              print("\nServing endpoint binding FAILED:")
              for e in errors:
                  print(e)
              sys.exit(1)
          EOF

  build-node:
    name: Node.js CLI — build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build TypeScript CLI
        run: cd typescript && npm install --silent && npm run build

      - name: Verify CLI output
        run: |
          echo '{"tool_name":"Bash","tool_input":{"command":"mvn help:describe"}}' | \
            node typescript/dist/cli.js | grep -q "additionalContext"
          echo "✓ Node.js CLI: additionalContext returned"

      - name: Run TypeScript tests
        run: cd typescript && npx vitest run --reporter=verbose
