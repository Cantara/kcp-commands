command: gradlew
platform: all
description: "Gradle wrapper — build, test, and run JVM and Android projects using the project-local Gradle distribution"

syntax:
  usage: "./gradlew [options] [task...]"
  key_flags:
    - flag: "build"
      description: "Compile, test, and assemble the project"
    - flag: "test"
      description: "Run all tests"
      use_when: "Verify the build after changes"
    - flag: "clean"
      description: "Delete build/ directory"
    - flag: "clean build"
      description: "Clean then full build"
      use_when: "Stale artifacts may be causing issues"
    - flag: "tasks"
      description: "List all available tasks in the project"
      use_when: "Discovering what tasks exist — run this first"
    - flag: "help --task <task>"
      description: "Show detailed help for a specific task"
    - flag: "-x test"
      description: "Exclude test task from execution"
      use_when: "Fast build — skip tests"
    - flag: "--tests <TestClass>"
      description: "Run a specific test class"
    - flag: "--tests <TestClass.method>"
      description: "Run a specific test method"
    - flag: ":<module>:test"
      description: "Test a specific subproject"
      use_when: "Multi-module project — target one module"
    - flag: "--parallel"
      description: "Execute independent tasks in parallel"
      use_when: "Multi-project builds — significant speedup"
    - flag: "--build-cache"
      description: "Enable the Gradle build cache"
      use_when: "Speed up repeated builds"
    - flag: "--rerun-tasks"
      description: "Ignore cached results — force re-execution"
      use_when: "Suspected cache corruption or flaky test reruns"
    - flag: "--continuous"
      description: "Watch mode — re-execute on file changes"
      use_when: "Iterating on code with fast feedback"
    - flag: "--stacktrace"
      description: "Print stacktrace on failure"
      use_when: "Debugging build errors"
    - flag: "-q"
      description: "Quiet — log errors only"
    - flag: "-i"
      description: "Info-level logging"
      use_when: "Need more detail on what Gradle is doing"
    - flag: "--stop"
      description: "Stop the Gradle daemon"
      use_when: "Daemon is misbehaving or consuming memory"
    - flag: "-P <key>=<value>"
      description: "Set a project property"
    - flag: "-D <key>=<value>"
      description: "Set a JVM system property"

  preferred_invocations:
    - invocation: "./gradlew build"
      use_when: "Standard build — compile, test, assemble"
    - invocation: "./gradlew build -x test"
      use_when: "Fast build — skip tests"
    - invocation: "./gradlew clean build"
      use_when: "Full clean build from scratch"
    - invocation: "./gradlew test --tests com.example.MyTest"
      use_when: "Run a single test class"
    - invocation: "./gradlew assembleDebug"
      use_when: "Android — build debug APK"
    - invocation: "./gradlew bootRun"
      use_when: "Spring Boot — run the application"

  common_errors:
    - error: "Task 'X' not found in root project"
      fix: "Run ./gradlew tasks to see available tasks. Task names are case-sensitive. In multi-module projects, prefix with :module:task."
    - error: "Permission denied: ./gradlew"
      fix: "Run chmod +x gradlew to make the wrapper executable."
    - error: "Could not find tools.jar / No such file or directory"
      fix: "Install a full JDK (not JRE). Verify JAVA_HOME points to the JDK root directory."
    - error: "Java heap space / OutOfMemoryError during build"
      fix: "Add org.gradle.jvmargs=-Xmx4g to gradle.properties. For Android builds, also set -XX:MaxMetaspaceSize=1g."
    - error: "Could not determine java version from 'X'"
      fix: "The project's Gradle version is too old for the installed JDK. Either upgrade the Gradle wrapper (gradle wrapper --gradle-version=X.Y) or use a compatible JDK."

output_schema:
  enable_filter: true
  noise_patterns:
    - pattern: "^> Task :"
      reason: "Task execution progress lines"
    - pattern: "^Deprecated Gradle features"
      reason: "Deprecation footer"
    - pattern: "^\\d+ actionable task"
      reason: "Task count summary"
    - pattern: "^To honour the JVM settings"
      reason: "JVM configuration notice"
    - pattern: "^Starting a Gradle Daemon"
      reason: "Daemon startup notice"
    - pattern: "^Download https://"
      reason: "Dependency download progress"
  max_lines: 60
  truncation_message: "... {remaining} more lines. Use --info for details or --quiet for errors only."
