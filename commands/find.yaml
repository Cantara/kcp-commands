command: find
platform: all
description: "Search for files in a directory hierarchy"

syntax:
  usage: "find [path...] [expression]"
  notes:
    - "Expressions are evaluated left to right — put -prune BEFORE other tests"
    - "Use -print0 | xargs -0 for filenames with spaces"
    - "Combine exclusions: -not \\( -path '*/node_modules/*' -o -path '*/.git/*' \\)"
  key_flags:
    - flag: "-name '<pattern>'"
      description: "Match filename (case-sensitive, supports * glob)"
      use_when: "Searching by filename"
    - flag: "-iname '<pattern>'"
      description: "Match filename (case-insensitive)"
    - flag: "-type f"
      description: "Match only regular files"
    - flag: "-type d"
      description: "Match only directories"
    - flag: "-maxdepth <N>"
      description: "Limit search depth"
      use_when: "Avoiding deep recursive searches"
    - flag: "-mtime -<N>"
      description: "Files modified in the last N days"
      use_when: "Finding recently changed files"
    - flag: "-newer <reffile>"
      description: "Files modified more recently than reffile"
      use_when: "Find files changed since a known timestamp"
    - flag: "-size +<N>M"
      description: "Files larger than N megabytes"
    - flag: "-not -path '*/node_modules/*'"
      description: "Exclude node_modules (combine with other expressions)"
    - flag: "-path '*/target/*' -prune -o"
      description: "Prune target dirs from search (Java/Maven repos)"
      use_when: "Skip build output in Java projects"
    - flag: "-exec <cmd> {} \\;"
      description: "Run command on each match ({} = matched path)"
      use_when: "Process each file — e.g. -exec grep -l 'pattern' {} \\;"
    - flag: "-exec <cmd> {} +"
      description: "Run command with all matches as args (batch, faster)"
      use_when: "Bulk operations — e.g. -exec chmod 644 {} +"

  preferred_invocations:
    - invocation: "find . -name '*.yaml' -not -path '*/node_modules/*'"
      use_when: "Find files by extension, excluding common noise dirs"
    - invocation: "find . -type f -mtime -7"
      use_when: "Files changed in the last week"
    - invocation: "find . -maxdepth 2 -type d"
      use_when: "Quick directory structure overview"
    - invocation: "find . -path '*/target' -prune -o -path '*/.git' -prune -o -name '*.java' -print"
      use_when: "Find Java files excluding build and git dirs"
    - invocation: "find . -type f -name '*.log' -exec rm {} +"
      use_when: "Delete all log files (batch exec)"

output_schema:
  enable_filter: true
  noise_patterns:
    - pattern: "^find: '.*': Permission denied$"
      reason: "Permission errors on system directories — usually not relevant"
  max_lines: 100
  truncation_message: "... {remaining} more results. Add -maxdepth or -name to narrow."
