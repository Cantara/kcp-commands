command: env
platform: all
description: "Print or set environment variables — inspect the runtime environment"

syntax:
  usage: "env [options] [name=value ...] [command]"
  key_flags:
    - flag: "(no args)"
      description: "Print all current environment variables"
    - flag: "name=value <cmd>"
      description: "Run command with an added/overridden env var"
    - flag: "-i <cmd>"
      description: "Run command with empty environment (clean slate)"
    - flag: "-u <name> <cmd>"
      description: "Run command with a variable unset"
    - flag: "name=value1 name2=value2 <cmd>"
      description: "Set multiple vars before running command"

  preferred_invocations:
    - invocation: "env"
      use_when: "Inspect all environment variables"
    - invocation: "env VAR=value <cmd>"
      use_when: "Inject env var for a single command run"
    - invocation: "env -i PATH=/usr/bin <cmd>"
      use_when: "Run command with minimal clean environment"

output_schema:
  enable_filter: false
