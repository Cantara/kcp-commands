command: curl
platform: all
description: "Transfer data from or to a server using URLs — HTTP, HTTPS, FTP, etc."

syntax:
  usage: "curl [OPTIONS] <URL>"
  notes:
    - "ALWAYS use -s in scripts — without it, progress bar pollutes stderr"
    - "ALWAYS use -L unless you specifically need to see the redirect"
    - "For JSON APIs, combine: curl -sL -H 'Content-Type: application/json'"
  key_flags:
    - flag: "-s"
      description: "Silent mode — no progress bar"
      use_when: "ALWAYS in scripts — progress bar is noise"
    - flag: "-L"
      description: "Follow redirects"
      use_when: "Almost always — many URLs redirect"
    - flag: "-o <file>"
      description: "Write output to file instead of stdout"
    - flag: "-O"
      description: "Save with the remote filename"
    - flag: "-H '<header>'"
      description: "Set a request header"
      use_when: "Authorization, Content-Type, etc."
    - flag: "-X <method>"
      description: "HTTP method (GET, POST, PUT, DELETE, PATCH)"
    - flag: "-d '<data>'"
      description: "Send data in request body (sets POST by default)"
      use_when: "API calls with JSON payload"
    - flag: "--data-binary @<file>"
      description: "Send file contents as binary body (no newline stripping)"
      use_when: "Upload files, binary payloads"
    - flag: "-w '\\n%{http_code}'"
      description: "Append HTTP status code after response body"
      use_when: "Check status codes in scripts"
    - flag: "--fail-with-body"
      description: "Exit non-zero on HTTP errors BUT still output response body"
      use_when: "Scripting — get both error details and failure exit code"
    - flag: "-f"
      description: "Fail silently on HTTP errors (no output, exit code 22)"
      use_when: "Scripting — detect failures via exit code only"
    - flag: "--retry <N>"
      description: "Retry N times on transient errors (timeout, 5xx)"
      use_when: "Flaky networks or APIs"
    - flag: "-v"
      description: "Verbose — show request/response headers"
      use_when: "Debug connection issues, see what's actually sent"

  preferred_invocations:
    - invocation: "curl -sL <url>"
      use_when: "Fetch a URL silently following redirects"
    - invocation: "curl -s -H 'Authorization: Bearer <token>' <url>"
      use_when: "Authenticated API call"
    - invocation: "curl -s -X POST -H 'Content-Type: application/json' -d '{\"key\":\"value\"}' <url>"
      use_when: "POST JSON to an API"
    - invocation: "curl -sL -o <file> <url>"
      use_when: "Download a file"
    - invocation: "curl -sL --fail-with-body -w '\\n%{http_code}' <url>"
      use_when: "Fetch with status code check — fail on error but show body"
    - invocation: "curl -s --data-binary @payload.json -H 'Content-Type: application/json' <url>"
      use_when: "POST a JSON file as body"

output_schema:
  enable_filter: false
  max_lines: 200
  truncation_message: "... {remaining} more lines. Pipe through jq for JSON or head for text."
