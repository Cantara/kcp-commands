command: ssh
platform: all
description: "Secure shell — remote login and command execution"

syntax:
  usage: "ssh [OPTIONS] [user@]hostname [command]"
  key_flags:
    - flag: "-i <keyfile>"
      description: "Identity file (private key)"
      use_when: "Using a specific SSH key (e.g. EC2: -i ~/.ssh/mykey.pem)"
    - flag: "-p <port>"
      description: "Port number (default: 22)"
      use_when: "Non-standard SSH port"
    - flag: "-L <local>:<host>:<remote>"
      description: "Local port forwarding (tunnel)"
      use_when: "Access remote services through SSH tunnel"
    - flag: "-R <remote>:<host>:<local>"
      description: "Remote port forwarding — expose local service to remote"
      use_when: "Make a local service reachable from the remote host"
    - flag: "-N"
      description: "No remote command — just tunnel"
      use_when: "Setting up port forwarding only"
    - flag: "-o BatchMode=yes"
      description: "Disable password prompts — fail immediately if key auth fails"
      use_when: "Scripting — never hang waiting for password input"
    - flag: "-o ConnectTimeout=<seconds>"
      description: "Timeout for connection attempt (default: system TCP timeout)"
      use_when: "Scripting — fail fast on unreachable hosts"
    - flag: "-v"
      description: "Verbose — debug connection issues"
      use_when: "Troubleshooting auth or connectivity failures"
    - flag: "-o StrictHostKeyChecking=no"
      description: "Skip host key verification"
      use_when: "Scripting against ephemeral hosts (CI/CD, containers)"
    - flag: "-J <jump-host>"
      description: "Jump/bastion host (ProxyJump)"
      use_when: "Reaching hosts behind a bastion"

  preferred_invocations:
    - invocation: "ssh user@host"
      use_when: "Interactive login"
    - invocation: "ssh user@host '<command>'"
      use_when: "Execute a single command remotely — QUOTE the command"
    - invocation: "ssh -i ~/.ssh/mykey.pem ec2-user@<ip> '<command>'"
      use_when: "EC2 remote execution (Amazon Linux = ec2-user, Ubuntu = ubuntu)"
    - invocation: "ssh -i ~/.ssh/mykey -p 2222 user@host"
      use_when: "Connect with specific key and port"
    - invocation: "ssh -L 8080:localhost:80 user@host -N"
      use_when: "Tunnel: local 8080 -> remote 80"
    - invocation: "ssh -o BatchMode=yes -o ConnectTimeout=5 user@host '<command>'"
      use_when: "Scripted remote command — no hanging, fast failure"

  common_errors:
    - error: "Permission denied (publickey)"
      fix: "Check key path (-i), file permissions (chmod 600 key), and that ssh-agent has the key (ssh-add -l). EC2 keys must be .pem with mode 0600."
    - error: "Connection timed out / No route to host"
      fix: "Verify host is reachable (ping), security group allows port 22, and correct IP/hostname."
    - error: "Host key verification failed"
      fix: "Remove old entry: ssh-keygen -R <host>. Or use -o StrictHostKeyChecking=no for ephemeral hosts."
    - error: "Pseudo-terminal will not be allocated"
      fix: "Use -t to force TTY allocation, or -T to explicitly disable it for piped commands."

output_schema:
  enable_filter: false
