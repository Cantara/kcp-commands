command: k6
platform: all
description: "Load testing tool (Grafana Labs)"

syntax:
  usage: "k6 <command> [options] <script>"
  key_flags:
    - flag: "run <script.js>"
      description: "Run a load test script"
    - flag: "--vus <n>"
      description: "Number of virtual users"
    - flag: "--duration <time>"
      description: "Test duration (e.g. 30s, 2m, 1h)"
    - flag: "--iterations <n>"
      description: "Total number of iterations across all VUs"
    - flag: "-e <KEY>=<value>"
      description: "Pass environment variable to script"
    - flag: "--out json=results.json"
      description: "Write results to JSON file"
    - flag: "--out influxdb=http://localhost:8086/k6"
      description: "Stream metrics to InfluxDB"
    - flag: "--summary-trend-stats 'med,p(95),p(99)'"
      description: "Show custom percentiles in summary"
    - flag: "--quiet / -q"
      description: "Suppress progress output, show only summary"
    - flag: "cloud <script.js>"
      description: "Run test on Grafana Cloud k6"
    - flag: "inspect <script.js>"
      description: "Show test configuration without running"
  preferred_invocations:
    - invocation: "k6 run --vus 10 --duration 30s script.js"
      use_when: "Basic load test"
    - invocation: "k6 run -e BASE_URL=http://localhost:3000 script.js"
      use_when: "Pass target URL as env var"
    - invocation: "k6 run --out json=results.json script.js"
      use_when: "Save results for analysis"

output_schema:
  enable_filter: true
  noise_patterns:
    - pattern: "^\\s+default"
      reason: "Per-iteration progress lines"
  max_lines: 60
  truncation_message: "... {remaining} more k6 output lines."
