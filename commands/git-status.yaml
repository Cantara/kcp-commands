command: git
subcommand: status
platform: all
description: "Show working tree status — staged, unstaged, and untracked files"

syntax:
  usage: "git status [<options>] [--] [<pathspec>...]"
  key_flags:
    - flag: "-s"
      description: "Short format: compact two-letter status codes"
      use_when: "Quick machine-readable overview"
    - flag: "-b"
      description: "Show branch and tracking info (combine with -s)"
    - flag: "--porcelain"
      description: "Stable short format for scripting"
    - flag: "-u"
      description: "Show untracked files (default: normal)"

  preferred_invocations:
    - invocation: "git status"
      use_when: "Default — human-readable status with hints"
    - invocation: "git status -sb"
      use_when: "Compact view with branch info"

output_schema:
  enable_filter: false
  noise_patterns:
    - pattern: "^\\s*\\(use \"git"
      reason: "Hint lines about git commands — Claude already knows these"
  max_lines: 50
  truncation_message: "... {remaining} more status lines."
