command: gh
subcommand: api
platform: all
description: "GitHub CLI — make authenticated GitHub API requests"

syntax:
  usage: "gh api <endpoint> [flags]"
  notes:
    - "Endpoints are relative paths — no https://api.github.com prefix needed"
    - "{owner} and {repo} are auto-filled from current git repo when using gh api"
    - "Use /repos/{owner}/{repo}/... (with leading /) or repos/{owner}/{repo}/... (without) — both work"
  key_flags:
    - flag: "<endpoint>"
      description: "GitHub API endpoint path (e.g. repos/{owner}/{repo}/pulls)"
    - flag: "-X POST"
      description: "HTTP method (GET default). Also: PUT, PATCH, DELETE"
    - flag: "-f <field>=<value>"
      description: "Add a string field to request body"
    - flag: "-F <field>=<value>"
      description: "Add a typed field (numbers, booleans auto-converted: -F draft=true)"
    - flag: "--jq '<filter>'"
      description: "Filter JSON response with jq expression"
    - flag: "--paginate"
      description: "Fetch all pages of paginated results"
    - flag: "-H 'Accept: application/vnd.github+json'"
      description: "Set Accept header (use +json not .v3+json for current API)"
    - flag: "--template '<go-template>'"
      description: "Format output with Go template"
      use_when: "Custom output formatting without jq"
    - flag: "-F ref=main"
      description: "Example typed field — branch refs, booleans, integers"
    - flag: "--input <file>"
      description: "Read request body from file"
      use_when: "Large JSON payloads"

  preferred_invocations:
    - invocation: "gh api repos/{owner}/{repo}/pulls --jq '.[].number'"
      use_when: "List PR numbers"
    - invocation: "gh api repos/{owner}/{repo}/pulls/123/comments --jq '.[].body'"
      use_when: "Read PR comments"
    - invocation: "gh api repos/{owner}/{repo}/contents/<path> --jq '.content' | base64 -d"
      use_when: "Read file contents from a repo"
    - invocation: "gh api repos/{owner}/{repo}/actions/runs --jq '.workflow_runs[:5] | .[].conclusion'"
      use_when: "Check recent CI run status"
    - invocation: "gh api repos/{owner}/{repo}/dispatches -X POST -f event_type=deploy"
      use_when: "Trigger a repository_dispatch event"
    - invocation: "gh api --paginate /orgs/{org}/repos --jq '.[].full_name'"
      use_when: "List all repos in an org (paginated)"
    - invocation: "gh api repos/{owner}/{repo}/releases/latest --jq '.tag_name'"
      use_when: "Get latest release tag"

  common_errors:
    - error: "404 Not Found"
      fix: "Check endpoint path — common mistakes: /repo/ vs /repos/, missing {owner}/{repo}, wrong resource name. Use gh api repos/{owner}/{repo} to verify access."
    - error: "422 Unprocessable Entity"
      fix: "Request body is malformed. Check field names/types. Use -F for booleans/numbers, -f for strings."

output_schema:
  enable_filter: false
