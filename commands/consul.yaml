command: consul
platform: all
description: "HashiCorp Consul — service discovery, health checking, and KV store"

syntax:
  usage: "consul <subcommand> [flags]"
  key_flags:
    - flag: "kv get <key>"
      description: "Read a value from the KV store"
    - flag: "kv put <key> <value>"
      description: "Write a value to the KV store"
    - flag: "kv delete <key>"
      description: "Delete a key from the KV store"
    - flag: "kv get -recurse <prefix>"
      description: "Read all keys under a prefix"
    - flag: "catalog services"
      description: "List all registered services"
    - flag: "catalog nodes"
      description: "List all nodes in the cluster"
    - flag: "members"
      description: "List cluster members and their status"
    - flag: "health service <name>"
      description: "Show health status of a service"
    - flag: "agent -dev"
      description: "Start a single-node dev agent (for testing)"
    - flag: "info"
      description: "Show agent info and cluster stats"

  preferred_invocations:
    - invocation: "consul kv get <key>"
      use_when: "Read a config value from Consul KV"
    - invocation: "consul catalog services"
      use_when: "List all services registered in the cluster"
    - invocation: "consul members"
      use_when: "Check cluster membership and health"

output_schema:
  enable_filter: false
