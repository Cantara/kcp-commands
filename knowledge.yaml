version: "0.21"

entity:
  name: kcp-commands
  type: claude-code-hook
  description: >
    Claude Code hook providing proactive CLI guidance (Phase A) and output
    filtering (Phase B). Saves 33% of a 200K context window by injecting compact
    syntax before Bash calls and filtering noisy output after them. Phase C
    writes every tool call to ~/.kcp/events.jsonl for kcp-memory.

