version: "0.26"

entity:
  name: kcp-commands
  type: claude-code-hook
  description: >
    Claude Code hook providing proactive CLI guidance, output noise filtering,
    and event logging for every Bash tool call. Phase A injects compact syntax
    hints before execution (292 bundled manifests). Phase B filters noisy output
    from mvn, terraform, docker, kubectl, git-status, git-diff, ls, diff, and
    more — stripping boilerplate before it reaches the context window. Phase C
    writes every Bash call to ~/.kcp/events.jsonl for kcp-memory episodic
    memory. ~84% of calls suppressed at 204 (zero overhead); ~10% produce
    inject events. Part of the KCP ecosystem alongside kcp-agent, kcp-harness,
    and kcp-memory.

