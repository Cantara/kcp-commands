command: ls
platform: all
description: "List directory contents"

syntax:
  usage: "ls [OPTION]... [FILE]..."
  key_flags:
    - flag: "-l"
      description: "Long format: permissions, links, owner, size, date, name"
      use_when: "Need file metadata"
    - flag: "-a"
      description: "Include hidden files (names starting with .)"
      use_when: "Looking for dotfiles, .env, .git, .claude"
    - flag: "-h"
      description: "Human-readable sizes (combine with -l)"
    - flag: "-t"
      description: "Sort by modification time, newest first"
      use_when: "Finding recently changed files"
    - flag: "-R"
      description: "Recursive listing"
      use_when: "Quick tree view (prefer find or tree for large directories)"
    - flag: "-S"
      description: "Sort by file size, largest first"

  preferred_invocations:
    - invocation: "ls -lh"
      use_when: "Inspecting file sizes and dates"
    - invocation: "ls -la"
      use_when: "Checking for hidden files and dotfiles"
    - invocation: "ls -lt | head -20"
      use_when: "Finding the most recently modified files"

output_schema:
  enable_filter: false
  noise_patterns:
    - pattern: "^total \\d+"
      reason: "Aggregate block count — rarely needed"
  max_lines: 100
  truncation_message: "... {remaining} more entries. Use 'ls | grep <pattern>' or 'find' to filter."
