command: ps
platform: linux
description: "Report a snapshot of running processes"

syntax:
  usage: "ps [OPTION]..."
  key_flags:
    - flag: "aux"
      description: "All processes, all users, with CPU/memory (BSD syntax)"
      use_when: "Default — find any process or check resource usage"
    - flag: "-ef"
      description: "All processes, full format with PPID and full command line (POSIX)"
      use_when: "Need parent PIDs or full argument lists"
    - flag: "-u <user>"
      description: "Processes owned by a specific user"
    - flag: "--sort=-%cpu"
      description: "Sort by CPU descending (combine with aux)"
      use_when: "Finding CPU hogs"
    - flag: "--sort=-%mem"
      description: "Sort by memory descending"
      use_when: "Finding memory hogs"

  preferred_invocations:
    - invocation: "ps aux"
      use_when: "Find any process or check what's running"
    - invocation: "ps aux | grep <name>"
      use_when: "Find a specific process by name"
    - invocation: "ps aux --sort=-%cpu | head -15"
      use_when: "Top CPU consumers"

output_schema:
  enable_filter: true
  noise_patterns:
    - pattern: "^USER\\s+PID"
      reason: "Header line repeated — keep only first occurrence"
  max_lines: 30
  truncation_message: "... {remaining} more processes. Use 'ps aux | grep <name>' to narrow down."
